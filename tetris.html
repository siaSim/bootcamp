<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웹 테트리스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111827; /* Tailwind gray-900 */
            color: #f3f4f6;
            touch-action: none; /* 모바일에서 스크롤 방지 */
            overflow: hidden;
        }
        canvas {
            background-color: #1f2937; /* Tailwind gray-800 */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 2px solid #374151; /* Tailwind gray-700 */
            border-radius: 8px;
        }
        .btn {
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.1s;
        }
        .btn:active {
            background-color: #4b5563; /* Tailwind gray-600 */
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center font-sans">

    <div class="text-center mb-4">
        <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 mb-2">TETRIS</h1>
    </div>

    <div class="flex flex-col md:flex-row gap-6 items-start">
        <!-- 게임 보드 -->
        <div class="relative">
            <canvas id="tetris" width="240" height="400" class="block"></canvas>
            <!-- 오버레이 UI (시작/일시정지/게임오버) -->
            <div id="overlay" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center rounded-lg">
                <h2 id="overlay-title" class="text-2xl font-bold mb-4 text-white">테트리스</h2>
                <button id="start-btn" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold shadow-lg transition transform hover:scale-105">게임 시작</button>
            </div>
        </div>

        <!-- 사이드 패널 -->
        <div class="flex flex-row md:flex-col gap-4 w-full md:w-auto justify-between md:justify-start">
            <!-- 점수 및 레벨 -->
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 w-32 shadow-lg">
                <div class="mb-2">
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">점수</p>
                    <p id="score" class="text-2xl font-mono text-yellow-400 font-bold">0</p>
                </div>
                <div>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">레벨</p>
                    <p id="level" class="text-xl font-mono text-blue-400 font-bold">1</p>
                </div>
                <div class="mt-2">
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">줄</p>
                    <p id="lines" class="text-xl font-mono text-green-400 font-bold">0</p>
                </div>
            </div>

            <!-- 다음 블록 -->
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 w-32 shadow-lg flex flex-col items-center">
                <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mb-2 w-full text-left">다음 블록</p>
                <canvas id="next-piece" width="80" height="80"></canvas>
            </div>
            
            <!-- 데스크톱 조작 안내 -->
            <div class="hidden md:block bg-gray-800 p-4 rounded-lg border border-gray-700 w-32 shadow-lg text-xs text-gray-400">
                <p class="mb-1"><b>방향키:</b> 이동</p>
                <p class="mb-1"><b>위쪽:</b> 회전</p>
                <p class="mb-1"><b>아래쪽:</b> 내리기</p>
                <p class="mb-1"><b>스페이스:</b> 뚝 떨어뜨리기</p>
                <p><b>P:</b> 일시정지</p>
            </div>
        </div>
    </div>

    <!-- 모바일 컨트롤 (작은 화면에서만 표시) -->
    <div class="md:hidden grid grid-cols-3 gap-2 mt-6 w-[240px]">
        <button id="btn-left" class="btn bg-gray-700 p-4 rounded-lg flex justify-center items-center shadow-md">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <button id="btn-rotate" class="btn bg-gray-700 p-4 rounded-lg flex justify-center items-center shadow-md">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
        <button id="btn-right" class="btn bg-gray-700 p-4 rounded-lg flex justify-center items-center shadow-md">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
        <button id="btn-down" class="btn bg-gray-700 p-4 rounded-lg flex justify-center items-center shadow-md col-span-2">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </button>
        <button id="btn-drop" class="btn bg-red-600 p-4 rounded-lg flex justify-center items-center shadow-md">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 13l-7 7-7-7m14-8l-7 7-7-7"></path></svg>
        </button>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-piece');
        const nextContext = nextCanvas.getContext('2d');

        // 스케일 설정 (블록 하나를 20x20 픽셀로)
        context.scale(20, 20);
        nextContext.scale(20, 20);

        // 색상 팔레트
        const colors = [
            null,
            '#06b6d4', // I - Cyan (Tailwind cyan-500)
            '#3b82f6', // J - Blue (Tailwind blue-500)
            '#f97316', // L - Orange (Tailwind orange-500)
            '#eab308', // O - Yellow (Tailwind yellow-500)
            '#22c55e', // S - Green (Tailwind green-500)
            '#a855f7', // T - Purple (Tailwind purple-500)
            '#ef4444'  // Z - Red (Tailwind red-500)
        ];

        // 테트로미노 모양 정의
        function createPiece(type) {
            if (type === 'T') {
                return [
                    [0, 0, 0],
                    [6, 6, 6],
                    [0, 6, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'L') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [0, 3, 3],
                ];
            } else if (type === 'J') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [2, 2, 0],
                ];
            } else if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 5, 5],
                    [5, 5, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'Z') {
                return [
                    [7, 7, 0],
                    [0, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        // 게임 보드 생성 (12 너비 x 20 높이)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        const board = createMatrix(12, 20);

        // 플레이어 상태
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            level: 1,
            lines: 0,
            next: null
        };

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let animationId;
        let isPaused = false;
        let isGameOver = false;

        const pieces = 'ILJOTSZ';

        function getRandomPiece() {
            return createPiece(pieces[pieces.length * Math.random() | 0]);
        }

        // 블록 그리기
        function drawMatrix(matrix, offset, ctx, isGhost = false) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        if (isGhost) {
                            ctx.globalAlpha = 0.2;
                        } else {
                            ctx.globalAlpha = 1.0;
                        }
                        
                        // 약간의 3D 효과를 위한 렌더링
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        if (!isGhost) {
                            ctx.fillStyle = 'rgba(255,255,255,0.3)';
                            ctx.fillRect(x + offset.x, y + offset.y, 1, 0.1);
                            ctx.fillRect(x + offset.x, y + offset.y, 0.1, 1);
                            ctx.fillStyle = 'rgba(0,0,0,0.3)';
                            ctx.fillRect(x + offset.x, y + offset.y + 0.9, 1, 0.1);
                            ctx.fillRect(x + offset.x + 0.9, y + offset.y, 0.1, 1);
                        }
                        ctx.globalAlpha = 1.0;
                    }
                });
            });
        }

        function drawNextPiece() {
            nextContext.fillStyle = '#1f2937';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (player.next) {
                // 다음 블록을 중앙에 배치하기 위한 오프셋 계산
                const offset = {
                    x: (4 - player.next[0].length) / 2,
                    y: (4 - player.next.length) / 2
                };
                drawMatrix(player.next, offset, nextContext);
            }
        }

        function draw() {
            context.fillStyle = '#1f2937';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(board, {x: 0, y: 0}, context);
            
            // 고스트 블록 그리기
            if (player.matrix && !isGameOver) {
                const ghostPos = {x: player.pos.x, y: player.pos.y};
                while (!collide(board, {matrix: player.matrix, pos: ghostPos})) {
                    ghostPos.y++;
                }
                ghostPos.y--;
                drawMatrix(player.matrix, ghostPos, context, true);
                
                // 실제 플레이어 블록 그리기
                drawMatrix(player.matrix, player.pos, context);
            }
        }

        // 보드와 조각의 충돌 체크
        function collide(board, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 보드에 블록 고정
        function merge(board, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        board[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // 완성된 줄 삭제 및 점수 계산
        function arenaSweep() {
            let rowCount = 1;
            let linesCleared = 0;
            outer: for (let y = board.length - 1; y > 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) {
                        continue outer;
                    }
                }

                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;

                player.score += rowCount * 100;
                rowCount *= 2;
                linesCleared++;
            }
            
            if (linesCleared > 0) {
                player.lines += linesCleared;
                player.level = Math.floor(player.lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
                updateScore();
            }
        }

        // 블록 내리기
        function playerDrop() {
            player.pos.y++;
            if (collide(board, player)) {
                player.pos.y--;
                merge(board, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        // 블록 한 번에 바닥으로 떨어뜨리기 (하드 드롭)
        function playerHardDrop() {
            while (!collide(board, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(board, player);
            playerReset();
            arenaSweep();
            dropCounter = 0;
        }

        // 블록 좌우 이동
        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(board, player)) {
                player.pos.x -= offset;
            }
        }

        // 새로운 블록 생성
        function playerReset() {
            if (!player.next) {
                player.next = getRandomPiece();
            }
            player.matrix = player.next;
            player.next = getRandomPiece();
            drawNextPiece();
            
            player.pos.y = 0;
            player.pos.x = (Math.floor(board[0].length / 2)) -
                           (Math.floor(player.matrix[0].length / 2));
                           
            if (collide(board, player)) {
                gameOver();
            }
        }

        // 행렬 회전 (블록 회전)
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }

            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        // 플레이어 블록 회전 (벽 충돌 방지 포함)
        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(board, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // 메인 게임 루프
        function update(time = 0) {
            if (isPaused || isGameOver) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        // UI 업데이트
        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
            document.getElementById('lines').innerText = player.lines;
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlay-title');
            const startBtn = document.getElementById('start-btn');
            
            if (isPaused) {
                cancelAnimationFrame(animationId);
                overlay.classList.remove('hidden');
                overlayTitle.innerText = "일시정지";
                startBtn.innerText = "계속하기";
            } else {
                overlay.classList.add('hidden');
                lastTime = performance.now();
                update(lastTime);
            }
        }

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationId);
            const overlay = document.getElementById('overlay');
            const overlayTitle = document.getElementById('overlay-title');
            const startBtn = document.getElementById('start-btn');
            
            overlay.classList.remove('hidden');
            overlayTitle.innerText = "게임 오버!";
            overlayTitle.classList.add('text-red-500');
            startBtn.innerText = "다시 시작";
        }

        function startGame() {
            board.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            player.lines = 0;
            player.next = null;
            dropInterval = 1000;
            updateScore();
            
            isGameOver = false;
            isPaused = false;
            
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('overlay-title').classList.remove('text-red-500');
            
            playerReset();
            lastTime = performance.now();
            update(lastTime);
        }

        // 키보드 입력 처리
        document.addEventListener('keydown', event => {
            if (isGameOver) return;
            
            // 방향키 및 스페이스바의 기본 스크롤 동작 방지
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) {
                event.preventDefault();
            }

            if (event.key === 'p' || event.key === 'P') {
                togglePause();
                return;
            }

            if (isPaused) return;

            if (event.code === 'ArrowLeft') {
                playerMove(-1);
            } else if (event.code === 'ArrowRight') {
                playerMove(1);
            } else if (event.code === 'ArrowDown') {
                playerDrop();
            } else if (event.code === 'ArrowUp') {
                playerRotate(1);
            } else if (event.code === 'Space') {
                playerHardDrop();
            }
        });

        // 모바일/UI 버튼 처리
        const createButtonHandler = (id, action) => {
            const btn = document.getElementById(id);
            if (!btn) return;
            
            const triggerAction = (e) => {
                e.preventDefault();
                if (!isPaused && !isGameOver) {
                    action();
                    draw(); // 모바일 터치 시 즉각적인 피드백을 위해 수동 그리기
                }
            };
            
            btn.addEventListener('touchstart', triggerAction, {passive: false});
            btn.addEventListener('mousedown', triggerAction);
        };

        createButtonHandler('btn-left', () => playerMove(-1));
        createButtonHandler('btn-right', () => playerMove(1));
        createButtonHandler('btn-down', () => playerDrop());
        createButtonHandler('btn-rotate', () => playerRotate(1));
        createButtonHandler('btn-drop', () => playerHardDrop());

        document.getElementById('start-btn').addEventListener('click', () => {
            if (isPaused && !isGameOver) {
                togglePause();
            } else {
                startGame();
            }
        });

        // 초기 화면 그리기
        updateScore();
        draw();
        drawNextPiece();

    </script>
</body>
</html>
